<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Setup – Crear Admin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c10;--surface:#13171f;--border:#1f2733;
      --accent:#5b8dee;--danger:#e05555;--success:#3ecf8e;
      --text:#dde3f0;--muted:#5a6680;--radius:10px;
      --font:'Segoe UI',system-ui,sans-serif;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 40px;max-width:420px;width:100%}
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    .sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:28px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .field input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:var(--font);transition:border-color .2s}
    .field input:focus{border-color:var(--accent)}
    .btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;margin-top:10px;padding:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
    .btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
    .msg{border-radius:var(--radius);font-size:13px;margin-top:14px;padding:11px 14px;display:none;line-height:1.5;white-space:pre-wrap;word-break:break-all}
    .msg.ok{background:rgba(62,207,142,.1);border:1px solid var(--success);color:var(--success)}
    .msg.err{background:rgba(224,85,85,.1);border:1px solid var(--danger);color:var(--danger)}
    .warn{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);border-radius:10px;color:#f5a623;font-size:12px;line-height:1.6;margin-bottom:22px;padding:11px 14px}
    .spinner{animation:spin 1s linear infinite;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;height:15px;width:15px}
    @keyframes spin{to{transform:rotate(360deg)}}
    hr{border:none;border-top:1px solid var(--border);margin:20px 0}
    .go{background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:var(--font);font-size:13px;padding:10px;width:100%;transition:color .15s,border-color .15s}
    .go:hover{color:var(--text);border-color:var(--accent)}
    .log{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:monospace;font-size:11px;margin-top:12px;max-height:120px;overflow-y:auto;padding:10px;display:none}
  </style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Jowiland · Setup único</div>
  <h1>Crear cuenta administrador</h1>
  <p class="sub">Ejecutá este paso solo una vez para crear el acceso principal al panel.</p>
  <div class="warn">⚠️ Eliminá este archivo una vez creada la cuenta.</div>
  <div class="field"><label>Nombre</label><input type="text" id="name" placeholder="Admin Principal"/></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="admin@ejemplo.com"/></div>
  <div class="field"><label>Contraseña</label><input type="password" id="pass" placeholder="Mínimo 6 caracteres"/></div>
  <button class="btn" id="btn" onclick="crear()">Crear administrador</button>
  <div class="msg" id="msg"></div>
  <div class="log" id="log"></div>
  <hr/>
  <button class="go" onclick="location.href='panel.html'">→ Ir al Panel de Administración</button>
</div>

<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const cfg = {
    apiKey:"AIzaSyAIqxYEo-flmj1KKz3f0x1CnKG8KoUMBrM",
    authDomain:"jowiland-2.firebaseapp.com",
    projectId:"jowiland-2",
    storageBucket:"jowiland-2.firebasestorage.app",
    messagingSenderId:"301719973403",
    appId:"1:301719973403:web:827b9a8df3e17ad74992be"
  };

  // Reutilizar app si ya existe para evitar el error "already exists"
  const app  = getApps().length ? getApp() : initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  function log(txt) {
    const el = document.getElementById("log");
    el.style.display = "block";
    el.textContent += txt + "\n";
    el.scrollTop = el.scrollHeight;
  }

  function show(t, c) {
    const el = document.getElementById("msg");
    el.textContent = t;
    el.className = "msg " + c;
    el.style.display = "block";
  }

  window.crear = async () => {
    const name  = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("pass").value;
    const btn   = document.getElementById("btn");
    const logEl = document.getElementById("log");

    logEl.textContent = "";
    document.getElementById("msg").style.display = "none";

    if (!name) return show("El nombre es obligatorio.", "err");
    if (!email) return show("El email es obligatorio.", "err");
    if (pass.length < 6) return show("La contraseña debe tener al menos 6 caracteres.", "err");

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Creando…';

    try {
      log("1. Creando usuario en Firebase Auth...");
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      log("   ✓ Auth OK — UID: " + cred.user.uid);

      log("2. Actualizando perfil...");
      await updateProfile(cred.user, { displayName: name });
      log("   ✓ Perfil actualizado");

      log("3. Guardando en Firestore...");
      await setDoc(doc(db, "users", cred.user.uid), {
        name,
        email,
        role: "admin",
        status: "active",
        points: 0,
        createdAt: serverTimestamp(),
        isMainAdmin: true
      });
      log("   ✓ Documento guardado en /users/" + cred.user.uid);

      show("✅ Cuenta de administrador creada para " + email + ". Ya podés ir al panel.", "ok");
      btn.textContent = "✓ Listo";
    } catch (e) {
      log("ERROR: " + e.code + " — " + e.message);
      const m = {
        "auth/email-already-in-use": "Ese email ya está registrado. Si ya creaste el admin, andá directo al panel.",
        "auth/invalid-email": "El formato del email no es válido.",
        "auth/weak-password": "La contraseña es muy corta (mínimo 6 caracteres).",
        "auth/network-request-failed": "Error de red. Verificá tu conexión a internet.",
        "auth/operation-not-allowed": "El método email/contraseña no está habilitado en Firebase. Habilitalo en Authentication → Sign-in method.",
      };
      show(m[e.code] || ("Error: " + e.code + "\n" + e.message), "err");
      btn.disabled = false;
      btn.textContent = "Crear administrador";
    }
  };

  document.getElementById("pass").addEventListener("keydown", e => {
    if (e.key === "Enter") window.crear();
  });
</script>
</body>
</html>
